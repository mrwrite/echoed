<section
  class="echo-state-panel surface-card w-full"
  [class.echo-state-panel--compact]="compact"
  [class.echo-state-panel--center]="align === 'center'"
  [class.echo-state-panel--empty]="variant === 'empty'"
  [class.echo-state-panel--error]="variant === 'error'"
  [class.echo-state-panel--unavailable]="variant === 'unavailable'"
  [class.echo-state-panel--blocked]="variant === 'blocked'"
  [class.echo-state-panel--permission]="variant === 'permission'"
  [class.echo-state-panel--success]="variant === 'success'"
  [attr.data-echo-state]="variant"
  [attr.role]="role"
  [attr.aria-live]="ariaLive"
  [attr.aria-label]="resolvedAriaLabel"
>
  <div class="echo-state-panel__inner">
    <div class="echo-state-panel__icon-shell" aria-hidden="true">
      <app-icon [name]="resolvedIconName" [size]="22"></app-icon>
    </div>

    <div class="echo-state-panel__content">
      <p *ngIf="eyebrow" class="echo-state-panel__eyebrow">{{ eyebrow }}</p>
      <h3 class="echo-state-panel__title">{{ title }}</h3>
      <p *ngIf="body" class="echo-state-panel__body">{{ body }}</p>
      <dl *ngIf="context || impact" class="echo-state-panel__details">
        <div *ngIf="context"><dt>Current context</dt><dd>{{ context }}</dd></div>
        <div *ngIf="impact"><dt>What changed</dt><dd>{{ impact }}</dd></div>
      </dl>

      <div *ngIf="actionLabel || secondaryActionLabel" class="echo-state-panel__actions">
        <button *ngIf="actionLabel" type="button" class="echo-state-panel__action"
          [attr.aria-label]="actionAriaLabel || actionLabel" (click)="action.emit()">{{ actionLabel }}</button>
        <button *ngIf="secondaryActionLabel" type="button" class="echo-state-panel__action echo-state-panel__action--secondary"
          [attr.aria-label]="secondaryActionAriaLabel || secondaryActionLabel" (click)="secondaryAction.emit()">{{ secondaryActionLabel }}</button>
      </div>
    </div>
  </div>
</section>
