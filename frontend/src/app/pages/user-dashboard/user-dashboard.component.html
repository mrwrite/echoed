      <div class="grid gap-4 md:grid-cols-2">
        <div class="h-32 rounded-2xl bg-slate-200 animate-pulse"></div>
        <div class="h-32 rounded-2xl bg-slate-200 animate-pulse"></div>
      </div>
    </div>
  </div>
</ng-template>
