<div [ngClass]="collapsed ? 'w-20' : 'w-64'" class="bg-blue-900 text-white h-screen transition-all duration-300 flex flex-col">
    <div class="flex items-center justify-between p-4">
      <span *ngIf="!collapsed" class="text-xl font-bold">Dashboard</span>
      <button (click)="toggle.emit()" class="text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
    <nav class="flex-1 px-2 space-y-2">
      <a href="#" class="block p-2 rounded hover:bg-blue-700">Dashboard</a>
      <a *ngIf="roleService.hasAccess('viewUsers')" href="#" class="block p-2 rounded hover:bg-blue-700">Users</a>
      <a *ngIf="roleService.hasAccess('viewStudents')" href="#" class="block p-2 rounded hover:bg-blue-700">Students</a>
      <a href="#" class="block p-2 rounded hover:bg-blue-700">Courses</a>
      <a *ngIf="roleService.hasAccess('viewReports')" href="#" class="block p-2 rounded hover:bg-blue-700">Reports</a>
      <a href="#" class="block p-2 rounded hover:bg-blue-700">Settings</a>
    </nav>
  </div>
