<div *ngIf="isActive && step" class="fixed bottom-6 right-6 max-w-md z-[60]">
  <div class="glass-panel shadow-soft-card border border-white/30 bg-[#0f1629]/90 text-white p-5 rounded-2xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-accent">Demo tour {{ stepIndex }} / {{ totalSteps }}</p>
        @if (step) {        
          <h3 class="text-xl font-bold leading-tight">{{ step.title }}</h3>
          <p class="text-sm text-white/80 mt-1">{{ step.description }}</p>
      }
      </div>
      <button
        class="text-white/70 hover:text-white"
        type="button"
        aria-label="Close tour"
        (click)="close()"
      >
        ✕
      </button>
    </div>
    <div class="mt-4 flex items-center justify-between">
      <span class="text-xs text-white/70">Guided investor-ready walkthrough</span>
      <button
        class="px-4 py-2 rounded-full bg-white text-primary font-semibold shadow-soft-card hover:translate-y-[-1px] transition"
        type="button"
        (click)="next()"
      >
        {{ stepIndex === totalSteps ? 'Done' : 'Next' }}
      </button>
    </div>
  </div>
</div>
