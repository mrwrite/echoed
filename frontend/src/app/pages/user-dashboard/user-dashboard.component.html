<ng-container *ngIf="isReady; else dashboardLoading">
  <router-outlet></router-outlet>
</ng-container>

<ng-template #dashboardLoading>
  <div class="p-6">
    <app-echo-loading-state
      density="section"
      ariaLabel="dashboard-loading"
      title="Loading dashboard"
      body="Your role-aware dashboard is being prepared."
    ></app-echo-loading-state>
  </div>
</ng-template>
