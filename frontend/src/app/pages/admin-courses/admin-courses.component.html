<div class="surface-card p-6">
  <div class="flex items-center justify-between mb-4">
    <div>
      <p class="section-heading text-primary text-sm">Admin</p>
      <h2 class="text-2xl font-bold text-ink">All Courses</h2>
    </div>
    <button class="px-3 py-2 rounded-xl bg-primary text-white text-sm font-semibold" (click)="goToCreateCourse()">Create Course</button>
  </div>
  <table class="w-full text-sm">
    <thead class="bg-slate-50 text-slate-600">
      <tr class="text-left">
        <th class="py-2 px-2">Title</th>
        <th class="py-2 px-2 text-right">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      <tr *ngFor="let course of courses" class="hover:bg-slate-50">
        <td class="py-3 px-2 font-semibold text-ink">{{ course.title }}</td>
        <td class="py-3 px-2 text-right space-x-2">
          <button class="text-sm text-primary font-semibold" (click)="onManageCourse(course.id)">Manage</button>
          <button class="text-sm text-red-600 font-semibold" (click)="onDeleteCourse(course.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
