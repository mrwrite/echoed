<div class="grid gap-4 grid-rows-[auto,auto,1fr,auto,auto,auto] grid-cols-1 sm:grid-cols-2 md:grid-cols-5">
    <div class="bg-white col-span-5 rounded-xl shadow">    
        <div class="flex justify-between items-center p-6">
            <div>
                <h2 class="text-2xl font-bold text-primary"> Welcome, {{userInfo.fullname}} </h2>
                <p class="text-gray-600">Here's a snapshot of what's happening on EchoEd.</p>
            </div>
        </div>
    </div>
   <h2 class="text-2xl font-bold text-primary col-span-5">My Courses</h2>
   
  <ng-container *ngFor="let sc of studentCourses">
    <app-student-course-card
      class="col-span-1 md:col-span-2"
      [title]="sc.course.title"
      [description]="sc.course.description"
      [thumbnailUrl]="sc.course.thumbnailUrl"
      [instructor]="sc.course.instructor"
      [rating]="sc.course.rating"
      [ratingCount]="sc.course.ratingCount"
    >
      <app-echo-button
        class="mt-2"
        color="primary"
        label="Start / Resume"
        (click)="startCourse(sc)"
      ></app-echo-button>
    </app-student-course-card>
  </ng-container>
  
  <h2 class="text-2xl font-bold text-primary col-span-5">Achievements Unlocked</h2>
  <app-achievement-item
    icon="🧠"
    title="Memory Master"
    description="Completed 10 quizzes"
  ></app-achievement-item>
  <app-achievement-item
    icon="📚"
    title="Knowledge Seeker"
    description="Completed 5 lessons"
  ></app-achievement-item>
  <app-achievement-item
    icon="🌍"
    title="Explorer"
    description="Finished 3 Geography units"
  ></app-achievement-item>
  <app-achievement-item
    icon="🎯"
    title="Precision Pro"
    description="Scored 100% on a quiz"
  ></app-achievement-item>
  <app-achievement-item
    icon="🏆"
    title="Streak Champ"
    description="5 days of login streak"
  ></app-achievement-item>
    <h2 class="text-2xl font-bold text-primary col-span-5">Available Courses</h2>

<ng-container *ngFor="let course of visibleAvailableCourses">
  <app-student-course-card
    class="col-span-1 md:col-span-2"
    [title]="course.title"
    [description]="course.description"
    [thumbnailUrl]="course.thumbnailUrl"
    [instructor]="course.instructor"
    [rating]="course.rating"
    [ratingCount]="course.ratingCount"
  >
    <app-echo-button
      class="mt-2"
      color="accent"
      label="Enroll"
      (click)="enrollInCourse(course.id)"
    ></app-echo-button>
  </app-student-course-card>
</ng-container>

<button
  *ngIf="availableCourses.length > 4"
  class="col-span-5 text-primary underline"
  (click)="toggleAvailableCoursesView()"
>
  {{ availableCoursesVisibleCount >= availableCourses.length ? 'View Less' : 'View More' }}
</button>

</div>

<echoed-lesson-viewer 
  *ngIf="showLesson && currentLesson"
  [lesson]="currentLesson"
  (segmentCompleted)="onLessonCompleted()"
/>
