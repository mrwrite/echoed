<h2 class="text-2xl font-bold text-primary mb-4">All Signups</h2>
<table class="w-full text-sm text-gray-700">
  <thead>
    <tr class="text-left border-b">
      <th class="pb-2">Name</th>
      <th class="pb-2">Role</th>
      <th class="pb-2">Signup Date</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users" class="tracking-tight leading-snug">
      <td class="py-2">{{ user.firstname }} {{user.lastname}}</td>
      <td class="py-2">{{ user.role }}</td>
      <td class="py-2">{{ user.created_at | date: 'MMM d, y' }}</td>
    </tr>
  </tbody>
</table>
