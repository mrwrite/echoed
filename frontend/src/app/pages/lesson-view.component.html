<echoed-lesson-viewer
  *ngIf="lesson"
  [lesson]="lesson!"
  [isTeacherLed]="false"
  (segmentCompleted)="onLessonCompleted()"
/>

<p *ngIf="!lesson && !courseCompleted">Loading lesson...</p>

<app-echo-modal
  [open]="courseCompleted"
  title="Course completed!"
  description="Return to the dashboard to explore more courses or review your progress."
  confirmText="Back to Dashboard"
  [showCancel]="false"
  (confirm)="returnToDashboard()"
/>
