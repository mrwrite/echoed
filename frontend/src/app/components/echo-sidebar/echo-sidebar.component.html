<div
  class="sidebar-shell bg-white/95 backdrop-blur-lg text-ink h-screen flex flex-col border-r border-slate-200/80 shadow-soft-card"
  [class.sidebar-shell--collapsed]="collapsed"
  [style.width]="collapsed ? 'var(--echo-sidebar-collapsed-width)' : 'var(--echo-sidebar-expanded-width)'"
>
  <div class="flex items-center justify-between p-4 gap-3">
    <div class="flex items-center gap-3 min-w-0" *ngIf="!collapsed">
      <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-primary to-secondary text-white flex items-center justify-center font-bold shrink-0">EE</div>
      <div class="min-w-0">
        <p class="text-xs uppercase tracking-[0.25em] text-primary">EchoEd</p>
        <p class="text-sm font-semibold text-slate-800 truncate">Demo Navigator</p>
      </div>
    </div>
    <button
      (click)="toggle.emit()"
      class="sidebar-toggle shrink-0 rounded-xl p-2"
      aria-label="Toggle sidebar"
      [attr.aria-expanded]="!collapsed"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <nav class="flex-1 px-2 pb-4 space-y-6 overflow-y-auto" aria-label="Primary navigation">
    <ng-container *ngIf="ready$ | async; else navSkeleton">
      <ng-container *ngIf="visibleNavSections$ | async as sections">
        <div *ngFor="let section of sections">
          <p class="text-xs uppercase tracking-[0.2em] text-slate-700 mb-2 px-2" *ngIf="!collapsed">{{ section.title }}</p>
          <div class="space-y-1">
            <a
              *ngFor="let item of section.items"
              [routerLink]="item.route"
              routerLinkActive="sidebar-link--active"
              ariaCurrentWhenActive="page"
              class="sidebar-link flex items-center rounded-xl transition"
              [class.sidebar-link--collapsed]="collapsed"
              [attr.aria-label]="collapsed ? item.label : null"
              [attr.title]="collapsed ? item.label : null"
            >
              <span aria-hidden="true" class="inline-block h-5 w-5 shrink-0 rounded-full bg-current opacity-70"></span>
              <span *ngIf="!collapsed" class="font-semibold truncate">{{ item.label }}</span>
            </a>
          </div>
        </div>
      </ng-container>
    </ng-container>

    <ng-template #navSkeleton>
      <app-echo-loading-state
        class="px-1"
        density="compact"
        ariaLabel="sidenav-loading"
        title="Loading navigation"
        body="Visible options will appear when access resolves."
      ></app-echo-loading-state>
    </ng-template>
  </nav>

  <div class="p-4 border-t border-slate-200/80" *ngIf="!collapsed && userInfo">
    <p class="text-xs text-slate-700">Logged in as</p>
    <p class="font-semibold text-primary">{{ userInfo.fullname }}</p>
    <p class="text-xs text-slate-700">{{ userInfo.role | titlecase }}</p>
  </div>
</div>
