<h2 class="text-2xl font-bold text-primary mb-4">All Courses</h2>
<ul class="space-y-2">
  <li *ngFor="let course of courses" class="flex justify-between tracking-tight leading-snug">
    <span>{{ course.title }}</span>
    <div>
      <button class="text-sm text-blue-600 hover:underline" (click)="onManageCourse(course.id)">Manage</button>
      <button class="text-sm text-red-600 hover:underline ml-2" (click)="onDeleteCourse(course.id)">Delete</button>
    </div>
  </li>
</ul>
