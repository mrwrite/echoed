<header class="bg-blue-900 text-white shadow px-6 py-4 flex justify-between items-center relative">
  <h1 class="text-2xl font-bold">Dashboard</h1>

  <!-- Avatar and Flyout -->
  <div class="relative" #menuContainer>
    <!-- Avatar Circle -->
    <div
      (click)="toggleMenu()"
      class="h-10 w-10 rounded-full bg-white text-blue-900 flex items-center justify-center font-bold uppercase cursor-pointer"
    >
      {{ getInitials() }}
    </div>

   <!-- Flyout Menu -->
   <div
   *ngIf="menuOpen"
   @menuAnim
   class="absolute right-0 mt-2 w-48 bg-white text-gray-800 rounded-xl shadow-lg ring-1 ring-black/5 z-50 transition-all
          before:content-[''] before:absolute before:-top-2 before:right-4 before:border-8 before:border-transparent
          before:border-b-white before:z-[-1]"
 >
   <ul class="py-1 text-sm">
     <li>
       <a
         class="block px-4 py-2 hover:bg-gray-100 hover:text-blue-600 transition-colors"
         routerLink="/profile"
       >
         👤 Profile
       </a>
     </li>
     <li>
       <a
         class="block px-4 py-2 hover:bg-gray-100 hover:text-blue-600 transition-colors"
         (click)="logout()"
       >
         🚪 Logout
       </a>
     </li>
   </ul>
 </div>
 
  </div>
</header>
