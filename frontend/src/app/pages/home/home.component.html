<div class="min-h-screen bg-gradient-to-br from-[#0f1629] via-[#f7f3ed] to-[#efe9ff]">
  <ng-container *ngIf="(ready$ | async) && (userInfo$ | async) as userInfo; else shellLoading">
    <div
      class="home-shell min-h-screen"
      [class.home-shell--lesson]="lessonMode"
      [class.home-shell--compact]="compactShell"
      [style.--echo-shell-sidebar-width]="lessonMode ? '0px' : sidebarWidth"
    >
      <echo-sidebar
        *ngIf="!lessonMode"
        class="home-shell__sidebar"
        [class.home-shell__sidebar--overlay]="sidebarOverlayMode"
        [userInfo]="userInfo"
        [collapsed]="sidebarCollapsed"
        (toggle)="sidebarCollapsed = !sidebarCollapsed"
        @fade
      ></echo-sidebar>
      <div class="home-shell__main flex flex-col min-h-screen">
        <echo-header *ngIf="!lessonMode" [userinfo]="userInfo" @fade></echo-header>
        <main class="home-shell__content flex-1 overflow-y-auto p-4 md:p-5 xl:p-6">
          <div *ngIf="!lessonMode" class="max-w-7xl mx-auto">
            <div class="mb-4 surface-card flex flex-wrap items-center justify-between gap-3 p-4 md:p-5">
              <div>
                <p class="text-xs uppercase tracking-[0.25em] text-primary">Demo Mode: K-5 African & African-American History</p>
                <p class="text-sm text-slate-700">Guide stakeholders through landing -> login -> dashboards -> lessons -> admin.</p>
              </div>
              <button (click)="startDemoTour()" class="px-4 py-2 bg-primary text-white rounded-full shadow-soft-card text-sm font-semibold transition hover:-translate-y-0.5 hover:bg-secondary">
                Start Demo Tour
              </button>
            </div>
            <div class="surface-card p-1 bg-white/50">
              <router-outlet></router-outlet>
            </div>
          </div>
          <router-outlet *ngIf="lessonMode"></router-outlet>
        </main>
      </div>
    </div>
  </ng-container>

  <ng-template #shellLoading>
    <div class="min-h-screen flex items-center justify-center px-6">
      <app-echo-loading-state
        class="w-full max-w-md"
        density="page"
        [centered]="true"
        ariaLabel="shell-loading"
        title="Preparing your workspace"
        body="We are resolving your authenticated shell and navigation context."
      ></app-echo-loading-state>
    </div>
  </ng-template>
</div>
