name: Feature Request
description: Suggest an idea for improving this project
title: "[Feature] <Short Description>"
labels: ["feature", "enhancement"]
assignees: [mrwrite]
body:
  - type: markdown
    attributes:
      value: "### 🌟 Feature Request"

  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "Describe the problem you're experiencing. Example: 'I'm always frustrated when...'"
      placeholder: "Explain the issue this feature will solve."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
      placeholder: "How should this feature work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
      placeholder: "Mention any workarounds or other ways to achieve the goal."

  - type: dropdown
    id: priority
    attributes:
      label: "Priority Level"
      description: "How important is this feature?"
      options:
        - "🔴 High (Must-have for next release)"
        - "🟡 Medium (Important, but not urgent)"
        - "🟢 Low (Nice to have, but not critical)"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: "Feature Status"
      description: "Current status of this feature request."
      options:
        - "📝 Proposed"
        - "🚀 In Progress"
        - "✅ Completed"

  - type: dropdown
    id: feature-type
    attributes:
      label: "Feature Type"
      description: "What type of feature is this?"
      options:
        - "✨ New Feature"
        - "🔧 Improvement"
        - "🐞 Bug Fix"
        - "📈 Performance Enhancement"

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Add any other context or screenshots about the feature request here."
      placeholder: "Provide links, mockups, or additional details if available."
