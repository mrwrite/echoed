<header class="sticky top-0 z-30 bg-white/90 backdrop-blur-xl shadow-elevated border-b border-primary/10 px-6 py-4">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="h-11 w-11 rounded-2xl bg-gradient-to-br from-primary to-secondary text-white flex items-center justify-center font-bold">EE</div>
      <div>
        <p class="text-xs uppercase tracking-[0.25em] text-primary">EchoEd Dashboard</p>
        <h1 class="text-xl font-bold text-ink">Command center</h1>
        <echo-breadcrumbs class="text-sm text-slate-500"></echo-breadcrumbs>
      </div>
      <span class="badge-soft hidden md:inline-flex">Investor-ready demo</span>
    </div>

    <div class="flex items-center gap-3">
      <div class="hidden md:flex flex-col items-end gap-2">
        <app-echo-loading-state
          *ngIf="orgsLoading"
          density="compact"
          ariaLabel="header-org-loading"
          title="Loading organizations"
          body="Restoring your confirmed organization context."
        ></app-echo-loading-state>
        <app-echo-state-panel
          *ngIf="!orgsLoading && orgsLoadError"
          [compact]="true"
          align="left"
          variant="error"
          eyebrow="Organization access unavailable"
          title="We could not load organizations"
          [body]="orgsLoadError"
          actionLabel="Retry"
          (action)="refreshOrganizations()"
        ></app-echo-state-panel>
        <app-echo-state-panel
          *ngIf="!orgsLoading && !orgsLoadError && organizations.length === 0"
          [compact]="true"
          align="left"
          variant="empty"
          eyebrow="No organizations"
          title="No organizations are available"
          body="Your confirmed access will appear here when organization memberships are available."
        ></app-echo-state-panel>
        <div *ngIf="!orgsLoading && !orgsLoadError && organizations.length > 0" class="flex flex-col items-end gap-2">
          <div class="flex items-center gap-2 bg-white/70 border border-primary/10 rounded-full px-3 py-2">
            <span class="text-xs font-semibold text-slate-500">Org</span>
            <select
              class="text-sm bg-transparent focus:outline-none disabled:opacity-60"
              [ngModel]="activeOrgId"
              (ngModelChange)="switchOrg($event)"
              [disabled]="switchPending"
              aria-label="Switch organization"
            >
              <option *ngFor="let org of organizations" [value]="org.id">{{ org.name }}</option>
            </select>
          </div>
          <app-echo-loading-state
            *ngIf="switchPending"
            density="compact"
            ariaLabel="header-org-switch-pending"
            title="Switching organization"
            body="Waiting for confirmed organization context."
          ></app-echo-loading-state>
          <app-echo-state-panel
            *ngIf="switchError"
            [compact]="true"
            align="left"
            variant="error"
            eyebrow="Switch failed"
            title="Organization context unchanged"
            [body]="switchError"
          ></app-echo-state-panel>
          <div *ngIf="!switchPending && !switchError" class="text-right">
            <p class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">Confirmed organization</p>
            <p class="text-sm text-slate-600">{{ activeOrganizationName }}</p>
            <p *ngIf="switchSuccess" class="mt-1 text-xs text-emerald-700">{{ switchSuccess }}</p>
          </div>
        </div>
      </div>
      <button aria-label="Open help and support" class="px-3 py-2 rounded-full border border-primary/20 text-primary bg-primary/5 text-sm font-semibold hidden sm:inline-flex hover:bg-primary/10">Help & Support</button>
      <button aria-label="Start guided tour" class="px-3 py-2 rounded-full border border-primary/20 text-white bg-primary text-sm font-semibold hidden sm:inline-flex hover:-translate-y-0.5 transition" (click)="startGuidedTour()">Start Guided Tour</button>
      <div class="relative" #menuContainer>
        <button
          (click)="toggleMenu()"
          class="h-11 w-11 rounded-full bg-gradient-to-br from-primary to-secondary text-white flex items-center justify-center font-bold uppercase"
          aria-label="Open profile menu"
        >
          {{ getInitials() }}
        </button>
        <div
          *ngIf="menuOpen"
          @menuAnim
          class="absolute right-0 mt-2 w-52 bg-white text-gray-800 rounded-2xl shadow-soft-card ring-1 ring-black/5 z-50"
        >
          <div class="px-4 py-3 border-b border-slate-100">
            <p class="font-semibold text-primary">{{ userinfo.fullname }}</p>
            <p class="text-xs text-slate-500">{{ userinfo.role | titlecase }}</p>
          </div>
          <ul class="py-1 text-sm">
            <li>
              <a
                class="block px-4 py-2 hover:bg-slate-50 hover:text-primary transition-colors"
                routerLink="/home/me/preferences"
              >
                Profile & Preferences
              </a>
            </li>
            <li>
              <button
                class="w-full text-left px-4 py-2 hover:bg-slate-50 hover:text-primary transition-colors"
                (click)="logout()"
              >
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>
