<div class="space-y-4">
    <!-- New Unit Form -->
    <div class="space-y-2">
      <div>
        <label class="block text-sm text-gray-700 mb-1">Unit Title</label>
        <input
          type="text"
          class="w-full border rounded p-2"
          [(ngModel)]="unitTitle"
        />
      </div>
  
      <div>
        <label class="block text-sm text-gray-700 mb-1">Unit Description (Optional)</label>
        <textarea
          class="w-full border rounded p-2"
          rows="2"
          [(ngModel)]="unitDescription"
        ></textarea>
      </div>
  
      <button
        (click)="addUnit()"
        class="bg-blue-600 text-white text-sm px-4 py-2 rounded hover:bg-blue-700 transition"
      >
        + Add Unit
      </button>
    </div>
  
    <!-- Current Units List -->
    <div *ngIf="courseWizardService.draftValue.units.length > 0" class="mt-6">
      <h3 class="text-lg font-semibold text-[#1A1A40] mb-4">Units Added:</h3>
  
      <ul class="space-y-3">
        <li *ngFor="let unit of courseWizardService.draftValue.units" class="flex justify-between items-center bg-gray-100 p-3 rounded">
          <div>
            <p class="font-semibold">{{ unit.title }}</p>
            <p class="text-sm text-gray-500" *ngIf="unit.content">{{ unit.content }}</p>
          </div>
  
          <button
            (click)="removeUnit(unit.id)"
            class="text-sm text-red-500 hover:underline"
          >
            Remove
          </button>
        </li>
      </ul>
    </div>
  </div>
