<ng-container *ngIf="lesson; else loading">
 <echoed-lesson-viewer [lesson]="lesson!" [isTeacherLed]="false" (segmentCompleted)="onLessonCompleted()"/>
 <div *ngIf="!lesson" class="p-6 bg-white rounded-xl shadow text-center">
  <p class="text-lg font-semibold text-[#1A1A40]">🎉 You've completed this unit!</p>
  <p class="text-sm text-gray-600 mt-2">Return to the dashboard to explore more courses or review your progress.</p>
</div>
</ng-container>

<ng-template #loading>
  <p>Loading lesson...</p>
</ng-template>
