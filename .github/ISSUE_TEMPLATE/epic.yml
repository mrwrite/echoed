name: "Epic"
description: "Track a large feature or project that consists of multiple tasks."
title: "[EPIC] <Epic Title>"
labels: ["epic"]
body:
  - type: markdown
    attributes:
      value: "## 🎯 Epic Overview"

  - type: input
    id: epic-title
    attributes:
      label: "Epic Title"
      description: "Provide a short and clear title for this epic."

  - type: textarea
    id: epic-description
    attributes:
      label: "Epic Description"
      description: "Describe the objective, goals, and expected outcome of this epic."
      placeholder: "Example: Implement a user dashboard to manage profile settings, notifications, and security options."

  - type: markdown
    attributes:
      value: "### 🔗 Related Issues / Tasks (Auto-updated)"
  
  - type: textarea
    id: epic-tasks
    attributes:
      label: "Task List"
      description: "This list will be updated automatically as new tasks are linked. DO NOT manually edit this section."
      value: |
        - [ ] Placeholder for dynamically added tasks

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "✅ Acceptance Criteria"
      description: "List the conditions that must be met for this epic to be considered complete."
      placeholder: "- Users can log in and see their dashboard\n- The dashboard displays notifications"

  - type: dropdown
    id: priority
    attributes:
      label: "📌 Priority Level"
      description: "How urgent is this epic?"
      options:
        - "High"
        - "Medium"
        - "Low"

  - type: dropdown
    id: status
    attributes:
      label: "🚀 Epic Status"
      description: "Select the current progress of this epic."
      options:
        - "Backlog"
        - "In Progress"
        - "Completed"
        - "Blocked"

  - type: textarea
    id: dependencies
    attributes:
      label: "⚠️ Dependencies"
      description: "List any other issues or external dependencies that must be completed before this epic can proceed."

  - type: textarea
    id: notes
    attributes:
      label: "📝 Additional Notes"
      description: "Any extra information relevant to this epic."
