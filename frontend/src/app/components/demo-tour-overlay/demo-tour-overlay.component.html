<div *ngIf="isActive && step" class="fixed bottom-6 right-6 max-w-md z-[60]">
  <div class="glass-panel shadow-soft-card border border-slate-200 bg-white text-ink p-5 rounded-2xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-primary">Demo tour {{ stepIndex }} / {{ totalSteps }}</p>
        @if (step) {        
          <h3 class="text-xl font-bold leading-tight">{{ step.title }}</h3>
          <p class="text-sm text-slate-700 mt-1">{{ step.description }}</p>
      }
      </div>
      <button
        class="text-slate-500 hover:text-slate-900"
        type="button"
        aria-label="Close tour"
        (click)="close()"
      >
        ✕
      </button>
    </div>
    <div class="mt-4 flex items-center justify-between">
      <span class="text-xs text-slate-500">Guided community walkthrough</span>
      <button
        class="px-4 py-2 rounded-full bg-primary text-white font-semibold shadow-soft-card hover:translate-y-[-1px] transition"
        type="button"
        (click)="next()"
      >
        {{ stepIndex === totalSteps ? 'Done' : 'Next' }}
      </button>
    </div>
  </div>
</div>
