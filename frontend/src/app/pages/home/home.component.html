<div class="ee-shell min-h-screen">
  <a class="skip-link" href="#echoed-main-content">Skip to main content</a>
  <ng-container *ngIf="(ready$ | async) && (userInfo$ | async) as userInfo; else shellLoading">
    <div
      class="home-shell min-h-screen"
      [class.home-shell--lesson]="lessonMode"
      [class.home-shell--compact]="compactShell"
      [style.--echo-shell-sidebar-width]="lessonMode ? '0px' : sidebarWidth"
    >
      <button
        *ngIf="!lessonMode && compactShell"
        #mobileNavTrigger
        type="button"
        class="mobile-nav-trigger"
        aria-label="Open navigation menu"
        aria-controls="echo-primary-navigation"
        [attr.aria-expanded]="mobileNavigationOpen"
        (click)="openMobileNavigation()"
      >
        Menu
      </button>
      <button
        *ngIf="sidebarOverlayMode"
        type="button"
        class="mobile-nav-backdrop"
        aria-label="Close navigation menu"
        (click)="closeMobileNavigation(true)"
      ></button>
      <echo-sidebar
        *ngIf="!lessonMode && (!compactShell || mobileNavigationOpen)"
        class="home-shell__sidebar"
        [class.home-shell__sidebar--overlay]="sidebarOverlayMode"
        [userInfo]="userInfo"
        [collapsed]="compactShell ? false : sidebarCollapsed"
        [mobileMode]="sidebarOverlayMode"
        (toggle)="toggleSidebar()"
        @fade
      ></echo-sidebar>
      <div class="home-shell__main flex flex-col min-h-screen">
        <echo-header *ngIf="!lessonMode" [userinfo]="userInfo" [mobileNavigationOpen]="mobileNavigationOpen" @fade></echo-header>
        <main
          id="echoed-main-content"
          class="home-shell__content flex-1 overflow-y-auto p-4 md:p-5 xl:p-6"
          tabindex="-1"
          [attr.aria-label]="lessonMode ? 'Lesson content' : 'Authenticated application content'"
        >
          <div *ngIf="!lessonMode" class="ee-shell__workspace mx-auto">
            <div class="ee-command-strip mb-4 flex flex-wrap items-center justify-between gap-3 p-4 md:p-5">
              <div>
                <p class="ee-command-strip__eyebrow">Learning community</p>
                <p class="ee-command-strip__copy">Use the navigation to move through the learning, teaching, studio, organization, and administration spaces available to your role.</p>
              </div>
              <button (click)="startDemoTour()" class="ee-button ee-motion-press">
                Start Demo Tour
              </button>
            </div>
            <div class="ee-shell__surface">
              <router-outlet></router-outlet>
            </div>
          </div>
          <router-outlet *ngIf="lessonMode"></router-outlet>
        </main>
      </div>
    </div>
  </ng-container>

  <ng-template #shellLoading>
    <div class="min-h-screen flex items-center justify-center px-6">
      <app-echo-loading-state
        class="w-full max-w-md"
        density="page"
        [centered]="true"
        ariaLabel="shell-loading"
        title="Preparing your workspace"
        body="We are resolving your authenticated shell and navigation context."
      ></app-echo-loading-state>
    </div>
  </ng-template>
</div>
