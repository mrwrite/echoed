<div class="space-y-6">
  <!-- Select Unit -->
  <div>
    <label class="block text-sm text-gray-700 mb-1">Select Unit</label>
    <select
      [(ngModel)]="selectedUnitId"
      class="w-full border rounded p-2"
    >
      <option value="" disabled selected>Select a Unit</option>
      <option *ngFor="let unit of courseWizardService.draftValue.units" [value]="unit.id">
        {{ unit.title }}
      </option>
    </select>
  </div>

  <!-- New Lesson Form -->
  <div *ngIf="selectedUnitId" class="space-y-4">
    <div>
      <label class="block text-sm text-gray-700 mb-1">Lesson Title</label>
      <input
        type="text"
        class="w-full border rounded p-2"
        [(ngModel)]="lessonTitle"
      />
    </div>

    <div>
      <label class="block text-sm text-gray-700 mb-1">Lesson Objective (Optional)</label>
      <textarea
        class="w-full border rounded p-2"
        rows="2"
        [(ngModel)]="lessonObjective"
      ></textarea>
    </div>

    <div>
      <label class="block text-sm text-gray-700 mb-1">Estimated Duration (Minutes)</label>
      <input
        type="number"
        min="1"
        class="w-full border rounded p-2"
        [(ngModel)]="lessonDuration"
      />
    </div>

    <button
      (click)="addLesson()"
      class="bg-blue-600 text-white text-sm px-4 py-2 rounded hover:bg-blue-700 transition"
    >
      + Add Lesson
    </button>
  </div>

  <!-- Current Lessons List -->
  <div *ngIf="selectedUnitId">
    <h3 class="text-lg font-semibold text-[#1A1A40] my-4">Lessons in Selected Unit:</h3>

    <ul *ngFor="let unit of courseWizardService.draftValue.units" class="space-y-3">
      <li *ngIf="unit.id === selectedUnitId">
        <ul class="space-y-2">
          <li *ngFor="let lesson of unit.lessons" class="flex justify-between items-center bg-gray-100 p-3 rounded">
            <div>
              <p class="font-semibold">{{ lesson.title }}</p>
              <p class="text-sm text-gray-500">Duration: {{ lesson.duration_minutes }} mins</p>
            </div>

            <button
              (click)="removeLesson(unit.id, lesson.id)"
              class="text-sm text-red-500 hover:underline"
            >
              Remove
            </button>
          </li>
        </ul>
      </li>
    </ul>
  </div>
</div>
