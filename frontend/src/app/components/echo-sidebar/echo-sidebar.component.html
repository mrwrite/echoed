<div [ngClass]="collapsed ? 'w-20' : 'w-64'" class="bg-blue-900 text-white h-screen fixed left-0 top-0 z-40 transition-all duration-300 flex flex-col">
    <div class="flex items-center justify-between p-4">
      <span *ngIf="!collapsed" class="text-xl font-bold">Dashboard</span>
      <button (click)="toggle.emit()" class="text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
    <nav class="flex-1 px-2 space-y-2">
      <a href="#" class="flex items-center p-2 rounded hover:bg-blue-700 space-x-2">
        <lucide-icon name="Home" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!collapsed">Dashboard</span>
      </a>
      <a *ngIf="roleService.hasAccess('viewUsers')" href="#" class="flex items-center p-2 rounded hover:bg-blue-700 space-x-2">
        <lucide-icon name="User" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!collapsed">Users</span>
      </a>
      <a *ngIf="roleService.hasAccess('viewStudents')" href="#" class="flex items-center p-2 rounded hover:bg-blue-700 space-x-2">
        <lucide-icon name="BookMarked" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!collapsed">Students</span>
      </a>
      <a href="#" class="flex items-center p-2 rounded hover:bg-blue-700 space-x-2">
        <lucide-icon name="Book" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!collapsed">Courses</span>
      </a>
      <a *ngIf="roleService.hasAccess('viewReports')" href="#" class="flex items-center p-2 rounded hover:bg-blue-700 space-x-2">
        <lucide-icon name="FileText" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!collapsed">Reports</span>
      </a>
      <a href="#" class="flex items-center p-2 rounded hover:bg-blue-700 space-x-2">
        <lucide-icon name="Settings" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!collapsed">Settings</span>
      </a>
    </nav>
  </div>
