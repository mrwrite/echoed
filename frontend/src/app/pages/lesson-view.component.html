<main class="min-h-screen bg-gradient-to-br from-primary/5 via-white to-accent/10 py-6" aria-label="Lesson experience">
  <div class="max-w-5xl mx-auto surface-card p-6">
    <header class="flex items-center justify-between mb-4" aria-labelledby="lesson-page-title">
      <div>
        <p class="section-heading text-primary text-sm">Immersive Lesson</p>
        <h2 id="lesson-page-title" class="text-2xl font-bold text-ink">{{ lesson?.title || 'Preparing your next lesson' }}</h2>
        <p class="muted-text">Step through each governed activity with clear focus and consistent learner guidance.</p>
      </div>
      <button aria-label="Exit lesson and return to dashboard" class="px-3 py-2 rounded-xl border border-primary text-primary font-semibold" (click)="returnToDashboard()">Exit lesson</button>
    </header>

    <div class="flex flex-wrap items-center gap-3 mb-4 text-sm text-slate-600" *ngIf="lesson" aria-label="Lesson state">
      <span class="px-3 py-1 rounded-full bg-primary/10 text-primary">Active segment</span>
      <span class="px-3 py-1 rounded-full bg-accent/30 text-ink">Guided reading & activities</span>
      <span *ngIf="demoMode" class="px-3 py-1 rounded-full bg-emerald-100 text-emerald-700">Demo preview</span>
    </div>

    <app-echo-loading-state
      *ngIf="loading"
      density="page"
      ariaLabel="lesson-loading"
      title="Preparing lesson delivery"
      body="We are resolving the current governed lesson segment and restoring your next activity."
    ></app-echo-loading-state>

    <section *ngIf="lesson && !loading" aria-label="Lesson content">
      <echoed-lesson-viewer
        [lesson]="lesson!"
        [isTeacherLed]="false"
        (segmentCompleted)="onLessonCompleted()"
      />
    </section>

    <app-echo-state-panel
      *ngIf="!lesson && !loading && governedDeliveryState && governedDeliveryState !== 'completed'"
      variant="blocked"
      eyebrow="Governed lesson state"
      [title]="governedStateTitle"
      [body]="governedStateBody"
      actionLabel="Return to dashboard"
      actionAriaLabel="Return to the learner dashboard"
      (action)="returnToDashboard()"
    ></app-echo-state-panel>

    <app-echo-state-panel
      *ngIf="!lesson && !loading && loadErrorMessage"
      variant="error"
      eyebrow="Lesson load failed"
      title="We could not prepare this lesson"
      [body]="loadErrorMessage"
      actionLabel="Retry"
      actionAriaLabel="Retry loading this lesson"
      (action)="retryLoad()"
    ></app-echo-state-panel>
  </div>
</main>

<app-echo-modal
  [open]="courseCompleted"
  title="Course completed!"
  description="Return to the dashboard to explore more courses or review your progress."
  confirmText="Back to Dashboard"
  [showCancel]="false"
  (confirm)="returnToDashboard()"
/>
