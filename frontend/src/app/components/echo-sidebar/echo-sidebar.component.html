<div [style.width]="collapsed ? 'var(--echo-sidebar-collapsed-width)' : 'var(--echo-sidebar-expanded-width)'" class="bg-white/80 backdrop-blur-lg text-ink h-screen fixed left-0 top-0 z-40 transition-all duration-300 flex flex-col border-r border-primary/10 shadow-soft-card">
  <div class="flex items-center justify-between p-4">
    <div class="flex items-center gap-3" *ngIf="!collapsed">
      <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-primary to-secondary text-white flex items-center justify-center font-bold">EE</div>
      <div>
        <p class="text-xs uppercase tracking-[0.25em] text-primary">EchoEd</p>
        <p class="text-sm font-semibold">Demo Navigator</p>
      </div>
    </div>
    <button (click)="toggle.emit()" class="text-primary" aria-label="Toggle sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <nav class="flex-1 px-2 space-y-6">
    <ng-container *ngIf="ready$ | async; else navSkeleton">
      <ng-container *ngIf="visibleNavSections$ | async as sections">
        <div *ngFor="let section of sections">
          <p class="text-xs uppercase tracking-[0.2em] text-slate-500 mb-2" *ngIf="!collapsed">{{ section.title }}</p>
          <a *ngFor="let item of section.items" [routerLink]="item.route" routerLinkActive="bg-primary/10 text-primary" class="flex items-center p-3 rounded-xl hover:bg-primary/10 transition space-x-2">
            <lucide-icon [name]="item.icon" class="h-5 w-5"></lucide-icon>
            <span *ngIf="!collapsed" class="font-semibold">{{ item.label }}</span>
          </a>
        </div>
      </ng-container>
    </ng-container>

    <ng-template #navSkeleton>
      <div class="space-y-3 px-1" aria-label="sidenav-loading">
        <div class="h-10 rounded-xl bg-slate-200/70 animate-pulse"></div>
        <div class="h-10 rounded-xl bg-slate-200/70 animate-pulse"></div>
        <div class="h-10 rounded-xl bg-slate-200/70 animate-pulse"></div>
      </div>
    </ng-template>
  </nav>

  <div class="p-4 border-t border-primary/10" *ngIf="!collapsed && userInfo">
    <p class="text-xs text-slate-500">Logged in as</p>
    <p class="font-semibold text-primary">{{ userInfo.fullname }}</p>
    <p class="text-xs text-slate-500">{{ userInfo.role | titlecase }}</p>
  </div>
</div>
