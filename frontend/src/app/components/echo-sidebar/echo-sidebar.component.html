<aside
  class="sidebar-shell ee-sidebar h-screen flex flex-col"
  [class.sidebar-shell--collapsed]="collapsed"
  [style.width]="collapsed ? 'var(--echo-sidebar-collapsed-width)' : 'var(--echo-sidebar-expanded-width)'"
  aria-label="Sidebar navigation"
>
  <div class="sidebar-brand flex items-center justify-between p-4 gap-3">
    <div class="flex items-center gap-3 min-w-0" *ngIf="!collapsed">
      <div class="sidebar-logo shrink-0">EE</div>
      <div class="min-w-0">
        <p class="sidebar-kicker">EchoEd</p>
        <p class="sidebar-title">Workspace OS</p>
      </div>
    </div>
    <button
      (click)="toggle.emit()"
      class="sidebar-toggle shrink-0 rounded-xl p-2"
      aria-label="Toggle sidebar"
      [attr.aria-expanded]="!collapsed"
      aria-controls="echo-primary-navigation"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <nav id="echo-primary-navigation" class="sidebar-nav flex-1 px-3 pb-4 space-y-6 overflow-y-auto" aria-label="Primary navigation">
    <ng-container *ngIf="ready$ | async; else navSkeleton">
      <ng-container *ngIf="visibleNavSections$ | async as sections">
        <section *ngFor="let section of sections; let sectionIndex = index" [attr.aria-label]="collapsed ? section.title : null" [attr.aria-labelledby]="!collapsed ? 'sidebar-section-' + sectionIndex : null">
          <p class="sidebar-section-title" *ngIf="!collapsed" [id]="'sidebar-section-' + sectionIndex">{{ section.title }}</p>
          <div class="space-y-1.5">
            <a
              *ngFor="let item of section.items"
              [routerLink]="item.route"
              routerLinkActive="sidebar-link--active"
              ariaCurrentWhenActive="page"
              class="sidebar-link flex items-center rounded-xl transition"
              [class.sidebar-link--collapsed]="collapsed"
              [attr.aria-label]="collapsed ? item.label : null"
              [attr.title]="collapsed ? item.label : null"
            >
              <span aria-hidden="true" class="sidebar-link__icon">
                {{ iconGlyph(item) }}
              </span>
              <span *ngIf="!collapsed" class="sidebar-link__label">{{ item.label }}</span>
            </a>
          </div>
        </section>
      </ng-container>
    </ng-container>

    <ng-template #navSkeleton>
      <app-echo-loading-state
        class="px-1"
        density="compact"
        ariaLabel="sidenav-loading"
        title="Loading navigation"
        body="Visible options will appear when access resolves."
      ></app-echo-loading-state>
    </ng-template>
  </nav>

  <div class="sidebar-profile p-4" *ngIf="!collapsed && userInfo">
    <div class="sidebar-profile__avatar">{{ userInfo.fullname.charAt(0) }}</div>
    <div class="min-w-0">
      <p class="sidebar-profile__eyebrow">Logged in as</p>
      <p class="sidebar-profile__name">{{ userInfo.fullname }}</p>
      <p class="sidebar-profile__role">{{ userInfo.role | titlecase }}</p>
    </div>
  </div>
</aside>
