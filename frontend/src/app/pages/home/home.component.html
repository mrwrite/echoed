<div class="min-h-screen bg-gradient-to-br from-[#0f1629] via-[#f7f3ed] to-[#efe9ff]">
  <ng-container *ngIf="(ready$ | async) && (userInfo$ | async) as userInfo; else shellLoading">
    <div
      class="home-shell min-h-screen"
      [class.home-shell--lesson]="lessonMode"
      [style.--echo-shell-sidebar-width]="lessonMode ? '0px' : sidebarWidth"
    >
      <echo-sidebar
        *ngIf="!lessonMode"
        class="home-shell__sidebar"
        [userInfo]="userInfo"
        [collapsed]="sidebarCollapsed"
        (toggle)="sidebarCollapsed = !sidebarCollapsed"
        @fade
      ></echo-sidebar>
      <div class="home-shell__main flex flex-col min-h-screen">
        <echo-header *ngIf="!lessonMode" [userinfo]="userInfo" @fade></echo-header>
        <main class="flex-1 overflow-y-auto p-6">
          <div *ngIf="!lessonMode" class="max-w-7xl mx-auto">
            <div class="mb-4 surface-card p-4 flex flex-wrap items-center justify-between gap-3">
              <div>
                <p class="text-xs uppercase tracking-[0.25em] text-primary">Demo Mode: K-5 African & African-American History</p>
                <p class="text-sm text-muted">Guide stakeholders through landing -> login -> dashboards -> lessons -> admin.</p>
              </div>
              <button (click)="startDemoTour()" class="px-4 py-2 bg-primary text-white rounded-full shadow-soft-card text-sm font-semibold hover:-translate-y-0.5 transition">
                Start Demo Tour
              </button>
            </div>
            <div class="surface-card p-1 bg-white/50">
              <router-outlet></router-outlet>
            </div>
          </div>
          <router-outlet *ngIf="lessonMode"></router-outlet>
        </main>
      </div>
    </div>
  </ng-container>

  <ng-template #shellLoading>
    <div class="min-h-screen flex items-center justify-center px-6" aria-label="shell-loading">
      <div class="surface-card p-6 w-full max-w-md text-center bg-white/80 backdrop-blur">
        <div class="h-4 w-24 mx-auto rounded-full bg-slate-200 animate-pulse mb-4"></div>
        <div class="h-10 w-10 mx-auto rounded-full bg-slate-200 animate-pulse mb-4"></div>
        <div class="h-4 w-40 mx-auto rounded-full bg-slate-200 animate-pulse"></div>
      </div>
    </div>
  </ng-template>
</div>
