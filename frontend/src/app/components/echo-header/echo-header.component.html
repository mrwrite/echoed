<header class="echo-header sticky top-0 z-30 px-4 py-4 md:px-5 xl:px-6" aria-label="Application header">
  <div class="echo-header__row flex flex-wrap items-start justify-between gap-4">
    <div class="echo-header__brand flex min-w-0 items-center gap-3 md:gap-4">
      <div class="echo-header__mark">EE</div>
      <div class="min-w-0">
        <p class="echo-header__eyebrow">EchoEd Dashboard</p>
        <h1 class="echo-header__title">Command center</h1>
        <echo-breadcrumbs></echo-breadcrumbs>
      </div>      
    </div>

    <div class="echo-header__actions flex w-full flex-wrap items-start justify-end gap-3 lg:w-auto lg:flex-nowrap" role="group" aria-label="Header actions">
      <div class="hidden lg:flex flex-col items-end gap-2">
        <app-echo-loading-state
          *ngIf="orgsLoading"
          density="compact"
          ariaLabel="header-org-loading"
          title="Loading organizations"
          body="Restoring your confirmed organization context."
        ></app-echo-loading-state>
        <app-echo-state-panel
          *ngIf="!orgsLoading && orgsLoadError"
          [compact]="true"
          align="left"
          variant="error"
          eyebrow="Organization access unavailable"
          title="We could not load organizations"
          [body]="orgsLoadError"
          actionLabel="Retry"
          (action)="refreshOrganizations()"
        ></app-echo-state-panel>
        <app-echo-state-panel
          *ngIf="!orgsLoading && !orgsLoadError && organizations.length === 0"
          [compact]="true"
          align="left"
          variant="empty"
          eyebrow="No organizations"
          title="No organizations are available"
          body="Your confirmed access will appear here when organization memberships are available."
        ></app-echo-state-panel>
        <div *ngIf="!orgsLoading && !orgsLoadError && organizations.length > 0" class="flex flex-col items-end gap-2">
          <div class="echo-org-select flex items-center gap-2 rounded-full px-3 py-2">
            <span>Org</span>
            <select
              class="min-w-0 max-w-[14rem] bg-transparent text-sm focus:outline-none disabled:opacity-60"
              [ngModel]="activeOrgId"
              (ngModelChange)="switchOrg($event)"
              [disabled]="switchPending"
              aria-label="Switch organization"
              aria-describedby="header-confirmed-org-description"
            >
              <option *ngFor="let org of organizations" [value]="org.id">{{ org.name }}</option>
            </select>
          </div>
          <app-echo-loading-state
            *ngIf="switchPending"
            density="compact"
            ariaLabel="header-org-switch-pending"
            title="Switching organization"
            body="Waiting for confirmed organization context."
          ></app-echo-loading-state>
          <app-echo-state-panel
            *ngIf="switchError"
            [compact]="true"
            align="left"
            variant="error"
            eyebrow="Switch failed"
            title="Organization context unchanged"
            [body]="switchError"
          ></app-echo-state-panel>
          <div *ngIf="!switchPending && !switchError" class="text-right" id="header-confirmed-org-description">
            <p class="echo-header__meta-label">Confirmed organization</p>
            <p class="echo-header__meta-value">{{ activeOrganizationName }}</p>
            <p *ngIf="switchSuccess" class="echo-header__success">{{ switchSuccess }}</p>
          </div>
        </div>
      </div>
      <button aria-label="Open help and support" class="echo-header__ghost hidden sm:inline-flex">Help & Support</button>
      <button aria-label="Start guided tour" class="echo-header__tour hidden sm:inline-flex" (click)="startGuidedTour()">Start Guided Tour</button>
      <div class="relative" #menuContainer>
        <button
          (click)="toggleMenu()"
          class="echo-header__avatar"
          aria-label="Open profile menu"
          aria-haspopup="menu"
          [attr.aria-expanded]="menuOpen"
          aria-controls="echo-header-profile-menu"
        >
          {{ getInitials() }}
        </button>
        <div
          *ngIf="menuOpen"
          @menuAnim
          id="echo-header-profile-menu"
          class="echo-header__menu absolute right-0 mt-2 w-52 rounded-2xl z-50"
          role="menu"
          aria-label="Profile menu"
        >
          <div class="echo-header__menu-head px-4 py-3">
            <p>{{ userinfo.fullname }}</p>
            <span>{{ userinfo.role | titlecase }}</span>
          </div>
          <ul class="py-1 text-sm">
            <li>
              <a
                class="echo-header__menu-item block px-4 py-2 transition-colors"
                routerLink="/home/me/preferences"
                role="menuitem"
              >
                Profile & Preferences
              </a>
            </li>
            <li>
              <button
                class="echo-header__menu-item w-full text-left px-4 py-2 transition-colors"
                role="menuitem"
                (click)="logout()"
              >
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>
