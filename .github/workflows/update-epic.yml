name: "Update Epic Issues"
on:
  issues:
    types: [opened, labeled, closed]

jobs:
  update-epic:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          repository: mrwrite/echoed
          token: ${{ secrets.PAT_GITHUB_TOKEN }}
      - name: "Find Matching Epic"
        uses: actions/github-script@v6
        id: find-epic
        with:
          script: |
            const { owner, repo } = context.repo;
            const { issue } = context.payload;

            // Find the epic label (starts with 'epic:')
            const epicLabel = issue.labels.find(label => label.name.startsWith('epic:'));
            if (!epicLabel) {
              console.log("No matching epic label found, skipping...");
              return;
            }

            console.log(`Issue is linked to epic: ${epicLabel.name}`);

            // Find an open epic with the same label
            const epics = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: epicLabel.name,  // Match tasks to the correct epic
              state: 'open',
              per_page: 100
            });

            if (epics.data.length === 0) {
              console.log("No open epic found with this label.");
              return;
            }

            const epic = epics.data[0];
            console.log(`Found Epic: ${epic.title} (#${epic.number})`);

            // Check if the task is already listed in the epic
            if (epic.body.includes(`#${issue.number}`)) {
              console.log(`Issue #${issue.number} is already linked to Epic #${epic.number}, skipping.`);
              return;
            }

            // Add the new issue to the epic's task list
            let updatedBody = epic.body + `\n- [ ] #${issue.number}`;
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: epic.number,
              body: updatedBody
            });

      - name: "Mark Task as Completed"
        uses: actions/github-script@v6
        if: github.event.action == 'closed'
        with:
          script: |
            const { owner, repo } = context.repo;
            const { issue } = context.payload;

            const epicLabel = issue.labels.find(label => label.name.startsWith('epic:'));
            if (!epicLabel) {
              console.log("No matching epic label found, skipping...");
              return;
            }

            // Find the epic with the same label
            const epics = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: epicLabel.name,
              state: 'open',
              per_page: 100
            });

            if (epics.data.length === 0) {
              console.log("No open epics found.");
              return;
            }

            const epic = epics.data[0];

            // Replace task with checked version
            let updatedBody = epic.body.replace(`- [ ] #${issue.number}`, `- [x] #${issue.number}`);

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: epic.number,
              body: updatedBody
            });
