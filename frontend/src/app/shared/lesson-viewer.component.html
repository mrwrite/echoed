<div class="p-6 bg-white rounded-xl shadow space-y-6">
  <div class="space-y-1">
    <h2 class="text-2xl font-bold text-[#1A1A40]">{{ lesson.title }}</h2>
    <p class="text-sm text-gray-600" *ngIf="lesson.objective">{{ lesson.objective }}</p>
    <p class="text-xs text-gray-500" *ngIf="lesson.duration_minutes">Duration: {{ lesson.duration_minutes }} minutes</p>
  </div>

  <div *ngFor="let activity of lesson.activities" class="border-t pt-4 space-y-2">
    <h3 class="font-semibold text-lg">{{ activity.title }}</h3>
    <div class="text-sm">
      <ng-container [ngSwitch]="activity.type">
        <div *ngSwitchCase="'video'">
          <ng-container *ngIf="isYouTubeLink(activity.content); else standardVideo">
            <iframe
              class="w-full rounded"
              [src]="getYouTubeEmbedUrl(activity.content)"
              frameborder="0"
              allowfullscreen>
            </iframe>
          </ng-container>
          <ng-template #standardVideo>
            <video class="w-full rounded" controls [src]="activity.content"></video>
          </ng-template>
        </div>
        <div *ngSwitchCase="'image'">
          <img class="rounded shadow" [src]="activity.content" alt="{{ activity.title }}">
        </div>
        <div *ngSwitchDefault>
          <p>{{ activity.content }}</p>
        </div>
      </ng-container>
    </div>
  </div>

  <div class="pt-6">
    <button
      class="px-4 py-2 rounded bg-green-600 text-white hover:bg-green-700"
      (click)="onMarkComplete()"
    >
      {{ isTeacherLed ? 'Mark Lesson Delivered' : 'Complete Lesson' }}
    </button>
  </div>
</div>
